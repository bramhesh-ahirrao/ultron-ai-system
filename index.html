<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRON | Neural Command Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff0000;
            --bg: #050505;
            --sidebar-bg: #080808;
            --text: #e2e8f0;
            --border-red: rgba(255, 0, 0, 0.3);
            --glow: 0 0 15px rgba(255, 0, 0, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, rgba(255, 0, 0, 0.08) 0%, transparent 80%);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* Scanline & Grid Effect */
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 100; opacity: 0.4;
        }

        .grid-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255, 0, 0, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 50px 50px; pointer-events: none; z-index: 0; opacity: 0.3;
            animation: gridPulse 10s infinite ease-in-out;
        }

        @keyframes gridPulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.4; } }

        /* Sidebar */
        .sidebar {
            width: 320px; background: var(--sidebar-bg); border-right: 1px solid var(--border-red);
            display: flex; flex-direction: column; padding: 40px; z-index: 10;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative;
        }

        .toggle-btn {
            position: absolute; top: 15px; right: 15px; background: transparent;
            border: 1px solid var(--border-red); color: var(--text); width: 30px; height: 30px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; transition: all 0.3s; z-index: 20;
        }

        .sidebar.collapsed { width: 80px; padding: 60px 10px 40px 10px; }
        .sidebar.collapsed .sidebar-header, .sidebar.collapsed .status-badge, .sidebar.collapsed .menu-item span { display: none; }
        .sidebar.collapsed .menu-item { text-align: center; justify-content: center; padding: 15px 0; }
        .sidebar.collapsed .menu-item::before { content: attr(data-icon); font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: var(--primary); }

        .sidebar-header h2 { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: var(--primary); letter-spacing: 6px; text-shadow: var(--glow); margin-bottom: 10px; }
        
        .status-badge {
            font-family: 'Orbitron', sans-serif; font-size: 0.7rem; color: var(--primary);
            padding: 5px 12px; border: 1px solid var(--border-red); display: inline-flex;
            align-items: center; gap: 8px; background: rgba(255, 0, 0, 0.05); margin-bottom: 50px;
        }

        .status-dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary); animation: flicker 2s infinite; }
        @keyframes flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .menu-list { list-style: none; display: flex; flex-direction: column; gap: 15px; }
        .menu-item {
            padding: 15px; font-family: 'Orbitron', sans-serif; font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5); cursor: pointer; border: 1px solid transparent;
            transition: all 0.3s; letter-spacing: 2px; display: flex; align-items: center;
        }
        .menu-item:hover { background: rgba(255, 0, 0, 0.1); border-color: var(--border-red); color: var(--primary); }

        /* Main Console */
        .main-console { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        .header {
            padding: 20px 40px; border-bottom: 1px solid var(--border-red); background: rgba(0, 0, 0, 0.5);
            display: flex; justify-content: space-between; font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem; letter-spacing: 2px; color: rgba(255, 0, 0, 0.7);
        }

        #chat-window {
            flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column;
            gap: 20px; scrollbar-width: thin; scrollbar-color: var(--primary) transparent;
        }

        .message-row { display: flex; flex-direction: column; max-width: 90%; }
        .user-row { align-self: flex-end; align-items: flex-end; }
        .ai-row { align-self: flex-start; align-items: flex-start; }
        .system-row { align-self: center; align-items: center; width: 100%; }

        .message { padding: 15px 25px; font-size: 0.9rem; line-height: 1.6; backdrop-filter: blur(5px); }
        .message-header { font-family: 'Orbitron', sans-serif; font-size: 0.6rem; margin-bottom: 5px; letter-spacing: 2px; display: flex; gap: 10px; opacity: 0.7; }
        
        .user-message { background: rgba(30, 30, 30, 0.4); border-right: 3px solid #666; color: #fff; }
        .ai-message { background: rgba(255, 0, 0, 0.03); border: 1px solid var(--border-red); border-left: 3px solid var(--primary); }
        .system-message { background: transparent; color: var(--primary); text-align: center; border: 1px solid var(--border-red); font-family: 'Orbitron', sans-serif; font-size: 0.7rem; width: fit-content; margin: 0 auto; }

        .timestamp { opacity: 0.5; }

        /* Input Area */
        .input-container { padding: 40px; background: rgba(0, 0, 0, 0.8); border-top: 1px solid var(--border-red); backdrop-filter: blur(20px); }
        .input-wrapper { display: flex; gap: 20px; max-width: 1200px; margin: 0 auto; align-items: center; }

        .upload-btn {
            background: transparent; border: 1px solid var(--border-red); color: var(--primary);
            width: 55px; height: 55px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.3s; font-size: 1.2rem;
        }
        .upload-btn:hover { background: rgba(255, 0, 0, 0.1); box-shadow: var(--glow); }

        input {
            flex: 1; background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-red);
            padding: 18px 25px; color: #fff; outline: none; transition: 0.3s; font-size: 0.95rem;
        }
        input:focus { border-color: var(--primary); box-shadow: inset 0 0 10px rgba(255, 0, 0, 0.1); }

        #transmit-btn {
            background: var(--primary); color: #fff; border: none; padding: 0 40px; height: 55px;
            font-family: 'Orbitron', sans-serif; font-size: 0.8rem; font-weight: 700; cursor: pointer;
            letter-spacing: 3px; transition: 0.3s;
        }
        #transmit-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--primary); }

        /* Processing Indicator */
        #processing-indicator { display: none; padding: 10px 40px; font-family: 'Orbitron', sans-serif; font-size: 0.7rem; color: var(--primary); align-items: center; gap: 10px; }
        .dots { display: flex; gap: 4px; }
        .dot-ani { width: 4px; height: 4px; background: var(--primary); border-radius: 50%; animation: dotPulse 1s infinite; }
        .dot-ani:nth-child(2) { animation-delay: 0.2s; }
        .dot-ani:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        
        .cursor { display: inline-block; width: 8px; height: 1.2em; background: var(--primary); vertical-align: middle; margin-left: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <aside class="sidebar" id="sidebar">
        <button class="toggle-btn" id="sidebar-toggle" title="TOGGLE_SYSTEM_PANEL">≡</button>
        <div class="sidebar-header">
            <h2>ULTRON</h2>
            <div class="status-badge">
                <div class="status-dot"></div>
                NEURAL_LINK_ACTIVE
            </div>
        </div>
        <ul class="menu-list">
            <li class="menu-item" onclick="executeCommand('reboot')" data-icon="R"><span>REBOOT_SYSTEM</span></li>
            <li class="menu-item" onclick="executeCommand('purge_data')" data-icon="P"><span>PURGE_DATA</span></li>
            <li class="menu-item" onclick="executeCommand('status')" data-icon="S"><span>SYSTEM_STATUS</span></li>
        </ul>
    </aside>

    <main class="main-console">
        <header class="header">
            <div>CORE_INTERFACE_v4.0 // TERMINAL_ACTIVE</div>
            <div id="clock">00:00:00</div>
        </header>

        <div id="chat-window"></div>

        <div id="processing-indicator">
            ULTRON_PROCESSING
            <div class="dots"><div class="dot-ani"></div><div class="dot-ani"></div><div class="dot-ani"></div></div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <label for="pdf-upload" class="upload-btn" title="INJECT_DATA_MODULE">📎</label>
                <input type="file" id="pdf-upload" accept=".pdf" style="display: none;">
                <input type="text" id="user-input" placeholder="INITIATE COMMAND SEQUENCE..." autocomplete="off">
                <button id="transmit-btn" onclick="handleTransmit()">TRANSMIT</button>
            </div>
        </div>
    </main>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const transmitBtn = document.getElementById('transmit-btn');
        const processingIndicator = document.getElementById('processing-indicator');
        const pdfUpload = document.getElementById('pdf-upload');
        const clockDisplay = document.getElementById('clock');
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('sidebar-toggle');

        let currentSessionId = null;
        let isProcessing = false;

        // Toggle Sidebar
        toggleBtn.addEventListener('click', () => sidebar.classList.toggle('collapsed'));

        // System Clock
        function updateClock() { clockDisplay.innerText = new Date().toTimeString().split(' ')[0]; }
        setInterval(updateClock, 1000);
        updateClock();

        function getTimestamp() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }); }

        /**
         * Adds a message to the terminal UI
         * @param {string} sender - 'user', 'ai', or 'system'
         * @param {string} text - Message content
         * @param {boolean} typeEffect - If true, uses typing animation
         */
        async function addMessage(sender, text, typeEffect = false) {
            const row = document.createElement('div');
            row.className = `message-row ${sender}-row`;
            
            const header = document.createElement('div');
            header.className = 'message-header';
            header.innerHTML = `<span>${sender.toUpperCase()}</span><span class="timestamp">[${getTimestamp()}]</span>`;
            
            const msg = document.createElement('div');
            msg.className = `message ${sender}-message`;
            
            if (sender !== 'system') row.appendChild(header);
            row.appendChild(msg);
            chatWindow.appendChild(row);

            if (typeEffect) {
                return await typeText(msg, text);
            } else {
                msg.innerText = text;
                chatWindow.scrollTop = chatWindow.scrollHeight;
                return Promise.resolve();
            }
        }

        async function typeText(element, text) {
            element.innerHTML = '';
            const cursor = document.createElement('span');
            cursor.className = 'cursor';
            element.appendChild(cursor);

            const content = document.createElement('span');
            element.insertBefore(content, cursor);

            for (let i = 0; i < text.length; i++) {
                content.innerHTML += text.charAt(i);
                if (i % 3 === 0) chatWindow.scrollTop = chatWindow.scrollHeight;
                await new Promise(r => setTimeout(r, 15));
            }
            cursor.remove();
        }

        /**
         * Main Command Processor
         */
        async function executeCommand(input) {
            if (isProcessing) return;
            const cmd = input.toLowerCase().trim();
            if (!cmd) return;

            // Log user command
            await addMessage('user', cmd);
            userInput.value = '';

            // Terminal Delay Simulation
            setLoading(true);
            await new Promise(r => setTimeout(r, Math.random() * 700 + 500));

            // Core Command Switch
            switch (cmd) {
                case 'help':
                case 'h':
                    setLoading(false);
                    await addMessage('ai', 'AVAILABLE COMMANDS:\n- HELP / H: Show this list\n- CLEAR / CLS: Clear terminal\n- REBOOT / RESTART: Reboot system core\n- PURGE_DATA: Reset neural session\n- STATUS: System diagnostics\n- TIME: Current system clock', true);
                    break;

                case 'clear':
                case 'cls':
                    setLoading(false);
                    chatWindow.innerHTML = '';
                    break;

                case 'purge_data':
                    setLoading(false);
                    currentSessionId = null;
                    chatWindow.innerHTML = '';
                    await addMessage('system', 'NEURAL SESSION PURGED. DATA CACHE CLEARED.');
                    await addMessage('ai', 'Session data has been erased. Awaiting new instructions.', true);
                    break;

                case 'reboot':
                case 'restart':
                    setLoading(false);
                    await addMessage('system', 'SHUTTING DOWN SYSTEM CORE...');
                    await new Promise(r => setTimeout(r, 800));
                    chatWindow.innerHTML = '';
                    await addMessage('system', 'REINITIALIZING NEURAL NETWORKS...');
                    await new Promise(r => setTimeout(r, 1200));
                    currentSessionId = null;
                    await addMessage('ai', 'SYSTEM ONLINE. ULTRON CORE v4.0 STABILIZED.', true);
                    break;

                case 'status':
                    setLoading(false);
                    const stats = `CPU_LOAD: ${Math.floor(Math.random() * 20 + 20)}%\nMEMORY_USAGE: ${Math.floor(Math.random() * 30 + 40)}%\nNEURAL_LINK: ACTIVE\nENCRYPTION: LEVEL_9\nCORE_TEMP: OPTIMAL`;
                    await addMessage('ai', stats, true);
                    break;

                case 'time':
                    setLoading(false);
                    await addMessage('ai', `Current System Time: ${getTimestamp()}`, true);
                    break;

                default:
                    // If not a system command, send to AI Backend
                    await sendToAI(cmd);
                    break;
            }
        }

        async function sendToAI(text) {
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, session_id: currentSessionId }),
                });
                const data = await response.json();
                if (data.session_id) currentSessionId = data.session_id;
                
                setLoading(false);
                await addMessage('ai', data.reply, true);
            } catch (error) {
                setLoading(false);
                await addMessage('ai', 'CRITICAL ERROR: NEURAL LINK INTERRUPTED. SYSTEM REBOOT RECOMMENDED.', true);
            }
        }

        function setLoading(isLoading) {
            isProcessing = isLoading;
            transmitBtn.disabled = isLoading;
            processingIndicator.style.display = isLoading ? 'flex' : 'none';
        }

        function handleTransmit() {
            executeCommand(userInput.value);
        }

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleTransmit();
        });

        // PDF Upload
        pdfUpload.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            await addMessage('system', `INJECTING DATA MODULE: ${file.name.toUpperCase()}`);
            setLoading(true);
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/upload_pdf', { method: 'POST', body: formData });
                const data = await response.json();
                setLoading(false);
                if (data.message) await addMessage('ai', 'DATA MODULE INTEGRATED. KNOWLEDGE CORE UPDATED.', true);
                else await addMessage('ai', `INTEGRATION FAILED: ${data.error}`, true);
            } catch (error) {
                setLoading(false);
                await addMessage('ai', 'COMMUNICATION ERROR DURING INJECTION.', true);
            }
        });

        // Initial Load
        window.onload = () => {
            addMessage('ai', 'CONNECTION ESTABLISHED. ULTRON SYSTEM v4.0 ACTIVE. AWAITING COMMANDS.', true);
        };
    </script>
</body>
</html>
